project:
  name: ORB_Research
  version: "1.0"

data:
  source: dukascopy        # default fetch source: mt5 | dukascopy
  raw_dir: "data/Level_0_Raw"
  features_dir: "data/Level_1_Features"
  datamart_dir: "data/Level_2_Datamart"
  timeframe: "1m"

symbols:
