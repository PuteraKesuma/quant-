      new_york: { open: "13:30", close: "14:30", tz: "UTC" }

orb:
  range_minutes: 30        # Opening range duration
  tp_multiplier: 1.0       # TP = range_size * multiplier
  sl_multiplier: 1.0       # SL = range_size * multiplier
  max_trades_per_session: 1
  entry_buffer_pips: 0     # Buffer above/below range high/low

walk_forward:
  in_sample_months: 6
  out_sample_months: 2
  step_months: 2
  min_trades: 30           # Minimum trades per window to be valid

live:
  host: "127.0.0.1"
  port: 8000
  data_source: mt5           # source of live bars for signal evaluation
  recent_bars: 600           # M1 bars pulled per evaluation (covers the NY ORB window)
  # MT5 returns bar times in BROKER SERVER time, not UTC. We shift them to true
  # UTC so the session windows (13:30 UTC NY etc.) line up with the research.
  # FBS = UTC+3 in summer (DST), UTC+2 in winter. null = auto-detect from a fresh
  # tick; set an integer to force it. Server warns if the live offset differs.
  mt5_server_utc_offset_hours: null
  poll_seconds: 1            # EA poll cadence (used to judge EA "connected" in heartbeat)
  heartbeat_seconds: 15      # server logs a heartbeat line at this cadence
  # Each entry is one independent strategy "slot". Multiple slots (even on the
  # same symbol) run concurrently and hold separate positions, tagged by `magic`.
  # `type` picks the engine (dummy | orb | <future model>); the EA never changes.
  # Give every slot a UNIQUE magic so positions never collide.
  strategies:
    - name: orb30_nas        # NAS100 — REPRODUCED 2026-06-28 (full live logic, M1 fill):
                             #   OOS PF 1.40, IS 1.28, 6/6 thn hijau, MC 5th-pct 1.04, 0% order invalid.
                             #   Edge nyata tapi TIPIS (exp ~0.08R). Klaim lama "1.52" sedikit optimis.
      type: orb
      symbol: NAS100
      session: new_york      # cash open; dst_open shifts it 13:30 (summer) / 14:30 (winter) UTC
      lot: 0.01              # start safe; scale once confirmed live
      magic: 920617          # same magic -> existing US100 EA keeps managing it
      params:
        range_minutes: 30    # NY 30-min opening range
        tp_mult: 1.0         # TP = 1 x range   (RR 1:1)
        sl_mult: 1.0         # SL = 1 x range
        use_sl: true         # real stop (RR 1:1 needs it)
        dst_open: true       # FIX: NAS cash open moves with US DST; fixed 13:30 was wrong half the year
        trend_sma: 50        # EDGE: only trade breakouts WITH the daily SMA50 trend (lifts OOS 1.02->1.35)
        breakeven_r: 0.5     # DYNAMIC EXIT: once +0.5R, exit at entry on retrace (OOS 1.33->1.52, DD down, WF 11/11)
        range_filter: false  # dropped: trend filter already does the heavy lifting; RF added ~nothing
        session_end_utc: "20:00"  # time-exit if neither SL/TP hit

    # DISABLED 2026-06-27 (lean-down): XAU-NY ORB berkorelasi dgn Z (dua-duanya gold) -> menambah
    # drawdown (DD -$270 -> -$427 saat aktif) dgn tambahan return tipis. Gold cukup Z + vision.
    # Uncomment utk mengaktifkan lagi. (magic 920618)
    # - name: orb30_xau
    #   type: orb
    #   symbol: XAUUSD
    #   session: new_york
    #   lot: 0.01
    #   magic: 920618
    #   params:
    #     range_minutes: 30
    #     tp_mult: 3.0
    #     sl_mult: 1.0
    #     use_sl: true
    #     session_end_utc: "20:00"

    - name: zrev_xau        # Z Strategy: PURE always-in Donchian stop-and-reverse XAUUSD 1H
      type: zrev            #   2026-06-29 audit (entry20/exit20 = always-in): IS PF 1.09, OOS 1.58,
                            #   MC 5th-pct 1.18, 5/6 thn hijau, 0% order invalid. ~4 trade/minggu,
                            #   hold ~1 hari, SELALU ada posisi (flip ~tiap 1.8 hari). maxDD -$501 @0.01
                            #   lot -> under-capitalized di $400 demo; real money butuh ~$1500+.
      symbol: XAUUSD
      lot: 0.01             # broker min XAU; always-in (selalu 1 posisi long/short)
      magic: 920622         # UNIQUE (920617=US100, 920618=orb_xau, 920620=orb_xau_asia lama, 920621=vision)
      params:
        entry_n: 20         # entry channel = breakout 20 jam (Donchian)
        exit_n: 20          # exit = entry -> S&R; dgn trend_filter -> flat saat lawan tren (bukan reverse)
        use_sl: true        # broker SL backstop = level channel lawan (proteksi kalau server mati)
        trend_filter: true  # filter tren EMA H1 -> skip whipsaw chop
        trend_ema: 100      # hanya long saat close>EMA100, hanya short saat close<EMA100
        daily_filter: true  # 2026-06-29: gate tren HARIAN (multi-TF align) -> DD -$406->-$313 (-23%),
        daily_sma: 50       #   PF 1.33->1.63, OOS 2.19, MC 1.41. Cuma trade kalau H1 + harian sepakat.
        dynamic_lot: true   # 2026-06-29 TEST: lot ikut momentum entry (z-score). Validasi: net +37%,
        lot_min: 0.01       #   DD -30%->-16%. z_dir<1 -> 0.01; ~2 -> 0.02; >=3 -> 0.03. Fail-safe.
        lot_max: 0.02       #   2026-07-01 KONSERVATIF jangka-panjang: plafon 0.02 (was 0.03 -> DD terburuk 5thn -65%)
        lot_z_lo: 1.0       # z_dir di mana lot mulai naik dari lot_min
        lot_z_hi: 3.0       # z_dir di mana lot capai lot_max (plafon absolut)
        lot_per_balance: 0.0000067 # 2026-07-01 KONSERVATIF: cap = balance*0.0000067 (~0.01/$1500).
                            #   $387->0.01 (fixed), tetap 0.01 s/d ~$1500, baru naik ke plafon 0.02 di ~$3000.
                            #   MC: DD terburuk 5thn ~-28%, risk-of-ruin ~0%. Survival jangka panjang.
        atr_stop_mult: 3.0  # 2026-06-30 TEST: broker SL backstop lebih ketat = entry +/- 3*ATR
                            #   (audit: PF 2.19->2.23, DD -$314->-$301, MC ->1.46; SL lebih dekat dari channel)
        history_bars: 15000 # ~250 jam = ~250 bar 1H (cukup utk EMA100+channel; kecil biar /signals cepat)

    - name: zrev_xau_4h     # Gold edge KEDUA: zrev di TF 4H (tangkap tren besar/lambat)
      type: zrev            #   2026-06-30 audit (xau_diversify.py): OOS PF 3.59, MC 1.71, net +$2500,
      symbol: XAUUSD        #   ~0.5 trade/mgg. Korelasi 0.84 ke 1H (bukan pengurangan risiko, aliran ke-2).
      lot: 0.01             # FIXED 0.01 (no dynamic lot) - jaga margin di exposure gold dobel
      magic: 920624         # UNIQUE (920622=zrev 1H, 920621=vision, 920617=US100)
      params:
        timeframe: "4h"     # channel/EMA dihitung di bar 4 jam
        entry_n: 20
        exit_n: 20
        use_sl: true
        trend_filter: true
        trend_ema: 50       # EMA50 di 4H (~8 hari) - cocok dgn backtest PF 3.59
        daily_filter: true
        daily_sma: 50
        history_bars: 15000 # ~250 jam = ~62 bar 4H (cukup utk EMA50+channel; kecil biar /signals cepat)

    # DISABLED 2026-06-28 (audit) — ARTIFACT, bukan edge. magic 920623.
    # Re-audit (research/audit_live_strategies.py, _DOC/audit_2026-06-28.md) menemukan:
    # entry_z 2.5 < stop_z 3.0 berarti SETIAP sinyal dengan |z| >= 3.0 punya SL di sisi
    # SALAH dari entry (BUY: SL >= entry; SELL: SL <= entry) -> order DITOLAK broker live.
    # 54% sinyal seperti ini. Validator lama (mr_validate.py/m1_validate.py, tak pernah
    # di-commit) membukukan `stop-entry` sebagai PROFIT untuk order tak-fillable itu ->
    # PF palsu OOS 2.74. Setelah order invalid dibuang + fill M1 jujur (SL sebelum TP):
    # OOS PF 0.72, WR 10%, 1/6 tahun hijau, MC 5th-pct 0.48 = RUGI. JANGAN diaktifkan.
    # - name: mr_xau
    #   type: mr
    #   symbol: XAUUSD
    #   lot: 0.01
    #   magic: 920623
    #   params:
    #     lookback: 20
    #     entry_z: 2.5
    #     stop_z: 3.0
    #     max_hold_hours: 48
    #     history_bars: 6000

    # vision_smc_xau: RETIRED 2026-07-01. LLM-as-decision-maker (entry gate via confidence)
    # is UNVERIFIABLE by construction (no reproducible historical signal series -> can't be
    # backtested), and in practice it just sat FLAT (conf 30-40 < gate 65) -> ~zero trades.
    # REPLACED by the SHADOW ADVISOR (see `advisor:` block below + pipeline/live/advisor.py):
    # LLM no longer DECIDES — it captures the chart + macro/micro context at each REAL brain
    # entry and logs a CONFIRM/CAUTION verdict ALONGSIDE the outcome, blocking nothing. After
    # 1-2 months we measure whether "caution" predicts losers -> only THEN earn the right to
    # let it filter. Honest forward-test, zero risk to the validated edge.

# AI-vision audit trail (used by pipeline/vision/journal.py)
vision:
  journal_path: "vision_journal.jsonl"
  archive_dir: "_DOC/vision"

# SHADOW ADVISOR (pipeline/live/advisor.py) — separate read-only process. On each NEW brain
# entry (matched by magic) it captures the chart, asks Claude for a macro/micro CONFIRM/CAUTION
# read, and logs it next to the trade. It NEVER places/blocks/sizes an order — pure insight.
# Run via START_ADVISOR.bat. Evaluate later with research/advisor_eval.py.
advisor:
  enabled: true
  poll_seconds: 15              # how often to scan MT5 for a new position (read-only)
  model: "claude-opus-4-8"
  max_tokens: 700
  timeframes: ["H4", "H1", "M15"]   # H4 = macro bias, H1 = structure, M15 = entry context
  prompt_file: "pipeline/vision/prompt_advisor.md"
  journal_path: "advisor_journal.jsonl"
  archive_dir: "_DOC/advisor"
  # which live magics to watch -> canonical symbol + its TradingView feed for capture
  watch:
    - {magic: 920622, symbol: XAUUSD, tv_symbol: "OANDA:XAUUSD"}      # zrev_xau (1H)
    - {magic: 920624, symbol: XAUUSD, tv_symbol: "OANDA:XAUUSD"}      # zrev_xau_4h
    - {magic: 920617, symbol: NAS100, tv_symbol: "OANDA:NAS100USD"}   # orb30_nas

audit:
  interval_minutes: 15       # continuous worker re-check cadence
  enable_repair: true        # auto-repair gaps/anomalies (false = report only)
  refetch_before_fill: false # re-fetch medium gaps from source first (slow; useful for flaky sources)
  max_refetch_days: 60       # cap on days re-fetched per symbol per cycle
  max_fill_gap_minutes: 5    # intraday gaps <= this may be forward-filled (synthetic)
  spike_return_threshold: 0.10   # |1m return| above this is flagged as a spike
  flatline_repair: false     # flatline bars are reported, not repaired
  report_dir: "_DOC/audit"
  gaps_dir: "data/Level_2_Datamart/audit"
