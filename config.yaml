      new_york: { open: "13:30", close: "14:30", tz: "UTC" }

orb:
  range_minutes: 30        # Opening range duration
  tp_multiplier: 1.0       # TP = range_size * multiplier
  sl_multiplier: 1.0       # SL = range_size * multiplier
  max_trades_per_session: 1
  entry_buffer_pips: 0     # Buffer above/below range high/low

walk_forward:
  in_sample_months: 6
  out_sample_months: 2
  step_months: 2
  min_trades: 30           # Minimum trades per window to be valid

live:
  host: "127.0.0.1"
  port: 8000
  data_source: mt5           # source of live bars for signal evaluation
  recent_bars: 600           # M1 bars pulled per evaluation (covers the NY ORB window)
  # MT5 returns bar times in BROKER SERVER time, not UTC. We shift them to true
  # UTC so the session windows (13:30 UTC NY etc.) line up with the research.
  # FBS = UTC+3 in summer (DST), UTC+2 in winter. null = auto-detect from a fresh
  # tick; set an integer to force it. Server warns if the live offset differs.
  mt5_server_utc_offset_hours: null
  poll_seconds: 1            # EA poll cadence (used to judge EA "connected" in heartbeat)
  heartbeat_seconds: 15      # server logs a heartbeat line at this cadence
  # Each entry is one independent strategy "slot". Multiple slots (even on the
  # same symbol) run concurrently and hold separate positions, tagged by `magic`.
  # `type` picks the engine (dummy | orb | <future model>); the EA never changes.
  # Give every slot a UNIQUE magic so positions never collide.
  strategies:
    - name: orb30_nas        # NAS100 — REPRODUCED 2026-06-28 (full live logic, M1 fill):
                             #   OOS PF 1.40, IS 1.28, 6/6 thn hijau, MC 5th-pct 1.04, 0% order invalid.
                             #   Edge nyata tapi TIPIS (exp ~0.08R). Klaim lama "1.52" sedikit optimis.
      type: orb
      symbol: NAS100
      session: new_york      # cash open; dst_open shifts it 13:30 (summer) / 14:30 (winter) UTC
      lot: 0.01              # start safe; scale once confirmed live
      magic: 920617          # same magic -> existing US100 EA keeps managing it
      params:
        range_minutes: 30    # NY 30-min opening range
        tp_mult: 1.0         # TP = 1 x range   (RR 1:1)
        sl_mult: 1.0         # SL = 1 x range
        use_sl: true         # real stop (RR 1:1 needs it)
        dst_open: true       # FIX: NAS cash open moves with US DST; fixed 13:30 was wrong half the year
        trend_sma: 50        # EDGE: only trade breakouts WITH the daily SMA50 trend (lifts OOS 1.02->1.35)
        breakeven_r: 0.5     # DYNAMIC EXIT: once +0.5R, exit at entry on retrace (OOS 1.33->1.52, DD down, WF 11/11)
        range_filter: false  # dropped: trend filter already does the heavy lifting; RF added ~nothing
        session_end_utc: "20:00"  # time-exit if neither SL/TP hit

    # DISABLED 2026-06-27 (lean-down): XAU-NY ORB berkorelasi dgn Z (dua-duanya gold) -> menambah
    # drawdown (DD -$270 -> -$427 saat aktif) dgn tambahan return tipis. Gold cukup Z + vision.
    # Uncomment utk mengaktifkan lagi. (magic 920618)
    # - name: orb30_xau
    #   type: orb
    #   symbol: XAUUSD
    #   session: new_york
    #   lot: 0.01
    #   magic: 920618
    #   params:
    #     range_minutes: 30
    #     tp_mult: 3.0
    #     sl_mult: 1.0
    #     use_sl: true
    #     session_end_utc: "20:00"

    - name: zrev_xau        # Z Strategy: Donchian stop-and-reverse XAUUSD 1H (champion entry100/exit20)
      type: zrev            #   research 2026-06-26: PF 1.43, 6/7 thn hijau, MC 5th-pct 1.11 (kalahkan ORB XAU)
      symbol: XAUUSD
      lot: 0.01             # broker min XAU; always-in (selalu 1 posisi long/short)
      magic: 920622         # UNIQUE (920617=US100, 920618=orb_xau, 920620=orb_xau_asia lama, 920621=vision)
      params:
        entry_n: 100        # entry channel = breakout 100 jam (Donchian)
        exit_n: 20          # exit channel = break balik 20 jam (Turtle-style, bisa flat di chop)
        use_sl: true        # broker SL backstop = level exit channel (proteksi kalau server mati)
        history_bars: 30000 # M1 ditarik per poll (cukup utk >100 jam completed + margin)

    # DISABLED 2026-06-28 (audit) — ARTIFACT, bukan edge. magic 920623.
    # Re-audit (research/audit_live_strategies.py, _DOC/audit_2026-06-28.md) menemukan:
    # entry_z 2.5 < stop_z 3.0 berarti SETIAP sinyal dengan |z| >= 3.0 punya SL di sisi
    # SALAH dari entry (BUY: SL >= entry; SELL: SL <= entry) -> order DITOLAK broker live.
    # 54% sinyal seperti ini. Validator lama (mr_validate.py/m1_validate.py, tak pernah
    # di-commit) membukukan `stop-entry` sebagai PROFIT untuk order tak-fillable itu ->
    # PF palsu OOS 2.74. Setelah order invalid dibuang + fill M1 jujur (SL sebelum TP):
    # OOS PF 0.72, WR 10%, 1/6 tahun hijau, MC 5th-pct 0.48 = RUGI. JANGAN diaktifkan.
    # - name: mr_xau
    #   type: mr
    #   symbol: XAUUSD
    #   lot: 0.01
    #   magic: 920623
    #   params:
    #     lookback: 20
    #     entry_z: 2.5
    #     stop_z: 3.0
    #     max_hold_hours: 48
    #     history_bars: 6000

    # vision_smc_xau: UNVERIFIED by construction (audit 2026-06-28). Discretionary LLM —
    # tak bisa di-backtest (tak ada deret sinyal historis yang reproducible). Biarkan
    # jalan di DEMO sbg forward-test; JANGAN aktifkan utk uang RIIL sebelum ada track
    # record live yang cukup. Bukan "REPRODUCED".
    - name: vision_smc_xau   # AI-vision gold, MULTI-TIMEFRAME SMC (H1+M15+M5) — the single vision base
      type: vision
      symbol: XAUUSD
      lot: 0.01
      magic: 920621          # UNIQUE (920617=US100, 920618=orb_xau, 920619=vision_xau, 920620=orb_xau_asia)
      params:
        interval_minutes: 30      # Claude called at most once / 30 min (3 images/call ~ 3x tokens of single-TF)
        active_windows_utc: ["00:00-22:00"]   # Asia+London+NY = 08:00-06:00 WITA
        capture_mode: tradingview            # 2026-06-28: real TradingView charts (headless), not mt5 render
        tv_symbol: "OANDA:XAUUSD"            # spot gold feed; closest to broker. Dynamic offset corrects the rest.
        timeframes: ["H4", "M15", "M5"]       # v2: H4 = macro bias (anti counter-trend), M5 = entry+SL/TP
        chart_bars: 200           # bars rendered per timeframe image
        model: "claude-opus-4-8"
        min_confidence: 65        # entry only if Claude conf >= this
        min_reverse_confidence: 75 # flipping an OPEN trade needs a higher bar (anti flip-flop)
        min_rr: 2.0               # v2: A+ setups earn >= 1:2 (was 1.5)
        price_offset: 0.0         # static fallback only; TV mode uses DYNAMIC offset = broker_price - chart_price
        max_offset_frac: 0.01     # reject (don't apply) a dynamic offset > 1% of price (guards a mis-read chart_price)
        prompt_file: "pipeline/vision/prompt_smc_mtf_v2.md"
        # Lock-profit reversal (rule-based, no Claude, every poll): once in profit
        # >= 0.5R, close the moment price breaks the swing of the last 3 completed M5
        # bars against the trade. Banks profit fast; zero extra tokens.
        lock_profit_reversal: true
        lock_min_profit_r: 0.5
        reversal_tf: M5
        reversal_lookback: 3
        archive_all_frames: false

# AI-vision audit trail (used by pipeline/vision/journal.py)
vision:
  journal_path: "vision_journal.jsonl"
  archive_dir: "_DOC/vision"

audit:
  interval_minutes: 15       # continuous worker re-check cadence
  enable_repair: true        # auto-repair gaps/anomalies (false = report only)
  refetch_before_fill: false # re-fetch medium gaps from source first (slow; useful for flaky sources)
  max_refetch_days: 60       # cap on days re-fetched per symbol per cycle
  max_fill_gap_minutes: 5    # intraday gaps <= this may be forward-filled (synthetic)
  spike_return_threshold: 0.10   # |1m return| above this is flagged as a spike
  flatline_repair: false     # flatline bars are reported, not repaired
  report_dir: "_DOC/audit"
  gaps_dir: "data/Level_2_Datamart/audit"
